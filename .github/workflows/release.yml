name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag in vX.Y.Z form
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  publish-crates:
    name: Publish crates
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.tag, 'v')
    runs-on: ubuntu-latest

    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y tmux unzip
          tmux new-session -d
          # The flatbuffers-generated code only compiles against a matching
          # flatc; the apt package is too old. Install the flatc release that
          # matches the `flatbuffers` crate version pinned in Cargo.lock.
          flatc_version="$(sed -nE '/name = "flatbuffers"/{n;s/^version = "(.*)"$/\1/p;}' crates/wisp-embers/Cargo.lock)"
          [ -n "$flatc_version" ] || { echo "could not determine flatbuffers version from Cargo.lock" >&2; exit 1; }
          curl -fsSL -o /tmp/flatc.zip \
            "https://github.com/google/flatbuffers/releases/download/v${flatc_version}/Linux.flatc.binary.g++-13.zip"
          sudo unzip -o /tmp/flatc.zip -d /usr/local/bin
          flatc --version

      - name: Cache cargo artifacts
        uses: swatinem/rust-cache@v2

      - name: Publish workspace crates
        run: scripts/release.sh publish "${RELEASE_TAG}"

  create-release:
    name: Create Release
    needs: publish-crates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Create GitHub release
        uses: taiki-e/create-gh-release-action@v1
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-binaries:
    name: Build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.tag, 'v')
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build-tool: cargo-zigbuild
          - os: macos-26
            target: aarch64-apple-darwin
            build-tool: cargo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build-tool: cargo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - name: Upload release archive
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: wisp
          package: wisp
          manifest-path: crates/wisp-bin/Cargo.toml
          target: ${{ matrix.target }}
          archive: wisp-$target
          build-tool: ${{ matrix.build-tool }}
          include: README.md LICENSE
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
